name: Deploy to Azure Container Apps
 
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
 
env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  IMAGE_NAME: paperclip-app
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
 
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
 
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}
 
      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME --all-tags
 
      - name: Run Database Migrations (Against Neon)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm --filter @paperclipai/db migrate
 
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name paperclip-app \
            --resource-group paperclip-rg \
            --image $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            --set-env-vars NODE_ENV=production DATABASE_URL=secretref:database-url SERVE_UI=true PORT=3100 BETTER_AUTH_SECRET=secretref:better-auth-secret